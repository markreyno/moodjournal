{% extends "base.html" %}
{% block title %}New Entry – Mood Journal{% endblock %}

{% block content %}
<h1>New Entry</h1>

<div class="card">
  <form method="POST" action="{{ url_for('journal_new') }}">
    <div class="form-group">
      <label for="content">How are you feeling today?</label>
      <!-- Jinja2 will repopulate the textarea if the form is re-shown after an error -->
      <textarea id="content" name="content" required
                placeholder="Write freely — this is your space...">{{ request.form.get('content', '') }}</textarea>
    </div>

    <div style="display:flex; gap:0.75rem;">
      <button type="submit" class="btn btn-primary">Save & analyse mood</button>
      <a href="{{ url_for('journal_list') }}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>

<p class="text-muted" style="margin-top:0.75rem;">
  Your entry will be analysed by AI to identify your mood. This usually takes a few seconds.
</p>
{% endblock %}
